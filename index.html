    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Habit Tracker Pro",
        "operatingSystem": "Web",
        "applicationCategory": "ProductivityApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "A gamified productivity app that turns building habits into a rewarding adventure."
      }

    <style>
      /* Inline critical CSS for the splash screen so it loads instantly */
      body {
        margin: 0;
        background-color: #181A1F;
        font-family: 'Inter', sans-serif;
      }
      .splash-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        color: #F9FAFB;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-left-color: #EF4444;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .splash-text {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(to right, #EF4444, #F9FAFB);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash-screen">
        <div class="spinner"></div>
        <div class="splash-text">Habit Tracker Pro</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
